[main]
term=foot
font=JetBrainsMono Nerd Font:size=8
pad=10x8
dpi-aware=yes
initial-window-size-pixels = 350x250 

[cursor]
style=beam
blink=yes

[scrollback]
lines=10000
indicator-position=relative

[colors]
foreground=f0f8ff
background=0a0a15

regular0=1a1a33
regular1=ff3366
regular2=1ee6a5
regular3=ffcc00
regular4=0080ff
regular5=c64dff
regular6=33d6ff
regular7=e6f0ff

bright0=334d80
bright1=ff5c85
bright2=4dffc3
bright3=ffe066
bright4=4da6ff
bright5=e680ff
bright6=80e5ff
bright7=f0f8ff

16=ff6600
17=cc5200

selection-foreground=f0f8ff
selection-background=1a1a33

search-box-no-match=0a0a15 ff3366
search-box-match=f0f8ff 151529

jump-labels=0a0a15 ff6600
urls=4d80ff
cursor=0a0a15 ff6600

[key-bindings]
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
# search-start=Control+Shift+f

[mouse]
hide-when-typing=yes

[url]
launch=xdg-open
